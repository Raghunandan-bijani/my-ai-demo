<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Knowledge Assistant</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --chat-bg: #ffffff;
            --primary-blue: #007bff;
            --user-msg: #e9ecef;
            --ai-msg: #f8f9fa;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #chat-container { width: 90%; max-width: 800px; height: 80vh; background: var(--chat-bg); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }

        header { background: var(--primary-blue); color: white; padding: 15px 20px; font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; }

        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        .message { padding: 12px 16px; border-radius: 15px; max-width: 80%; line-height: 1.5; font-size: 0.95rem; }
        .user-message { align-self: flex-end; background-color: var(--primary-blue); color: white; border-bottom-right-radius: 2px; }
        .ai-message { align-self: flex-start; background-color: var(--ai-msg); border: 1px solid #dee2e6; color: #333; border-bottom-left-radius: 2px; }

        #input-area { border-top: 1px solid #eee; padding: 20px; display: flex; gap: 10px; background: white; }
        
        input { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 25px; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--primary-blue); }

        button { background: var(--primary-blue); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        
        .loading { font-style: italic; color: #888; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>

<div id="chat-container">
    <header>
        <span>Llama 3.2 + RAG Assistant</span>
        <small style="font-weight: normal; font-size: 0.7rem;">Status: Connected to Local API</small>
    </header>

    <div id="chat-box">
        <div class="message ai-message">Hello! I'm ready to answer questions based on your custom data. What can I help you with?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-query" placeholder="Ask about your documents..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Ask AI</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('user-query');
        const chatBox = document.getElementById('chat-box');
        const query = inputField.value.trim();

        if (!query) return;

        // 1. Add User Message to UI
        appendMessage(query, 'user-message');
        inputField.value = '';

        // 2. Add "Thinking" placeholder
        const loadingId = 'loading-' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.id = loadingId;
        loadingDiv.className = 'message ai-message loading';
        loadingDiv.innerText = 'Llama is thinking...';
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // 3. Call your Python Backend (which we will build next)
            // Note: Use 'http://127.0.0' for your Flask/FastAPI backend
            const response = await fetch("http://localhost:11434/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama3.2",
                    prompt: query,
                    stream: false
                })
            });

            const data = await response.json();
            
            // 4. Replace loading with actual response
            document.getElementById(loadingId).remove();
            appendMessage(data.response, 'ai-message');

        } catch (error) {
            document.getElementById(loadingId).innerText = "Error: Could not connect to the backend.";
            console.error(error);
        }
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + className;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
