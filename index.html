<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bijani OS | AI Dashboard</title>
    <!-- Marked.js for beautiful AI formatting -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg: #020617;
            --sidebar-glass: rgba(15, 23, 42, 0.7);
            --accent-glow: #38bdf8;
            --accent-purple: #818cf8;
            --panel: rgba(30, 41, 59, 0.4);
            --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.08) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.08) 0, transparent 50%);
            color: #f8fafc; margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        nav { 
            width: 280px; background: var(--sidebar-glass); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 40px 24px;
        }

        .brand { font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 60px; color: #fff; }
        .section-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.15rem; margin: 30px 0 15px 10px; }

        .nav-btn { 
            padding: 16px 20px; border-radius: 16px; margin-bottom: 12px; cursor: pointer;
            display: flex; align-items: center; transition: 0.3s ease;
            background: transparent; border: 1px solid transparent; color: var(--text-dim);
        }

        .nav-btn:hover:not(.locked) { background: var(--panel); color: #fff; border-color: rgba(255,255,255,0.1); }
        .nav-btn.active { background: linear-gradient(135deg, var(--accent-glow), var(--accent-purple)); color: #020617; font-weight: 700; }
        .nav-btn.locked { opacity: 0.3; cursor: not-allowed; }
        
        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 12%; display: flex; flex-direction: column; gap: 25px; }

        .bubble { max-width: 85%; padding: 18px 22px; border-radius: 20px; line-height: 1.6; font-size: 0.95rem; animation: slideUp 0.4s ease forwards; }
        .user { align-self: flex-end; background: var(--panel); border: 1px solid rgba(255,255,255,0.1); }
        .ai { align-self: flex-start; background: rgba(56, 189, 248, 0.05); border: 1px solid rgba(56, 189, 248, 0.2); }
        
        /* Markdown styling inside AI bubble */
        .ai p { margin: 0 0 10px 0; }
        .ai code { background: rgba(255,255,255,0.1); padding: 2px 5px; border-radius: 4px; }

        .footer { padding: 20px 12% 40px; background: linear-gradient(to top, var(--bg), transparent); }
        .input-wrapper { 
            background: rgba(30, 41, 59, 0.6); border-radius: 24px; padding: 8px 8px 8px 25px;
            display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.05);
        }

        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 1rem; }
        .action-btn { background: #fff; color: #000; border: none; padding: 12px 28px; border-radius: 18px; cursor: pointer; font-weight: 800; }
        .action-btn:disabled { background: #444; cursor: not-allowed; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="brand">Bijani // OS</div>
        <div class="section-label">Core Intelligence</div>
        <div class="nav-btn active">Intelligence Hub</div>
        <div class="nav-btn">Data Vault</div>
        <div class="section-label">Creative Extensions</div>
        <div class="nav-btn locked">Vision Studio</div>
        <div class="nav-btn locked">Acoustic Synth</div>
    </nav>

    <main>
        <div id="chat-window">
            <div class="bubble ai">System ready. Awaiting secure inquiry...</div>
        </div>

        <div class="footer">
            <div class="input-wrapper">
                <input type="text" id="query" placeholder="Submit a secure request..." autocomplete="off">
                <button id="send-btn" class="action-btn" onclick="execute()">PROCEED</button>
            </div>
        </div>
    </main>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const queryInput = document.getElementById('query');
        const sendBtn = document.getElementById('send-btn');

        // Handle Enter Key
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') execute();
        });

        async function execute() {
            const prompt = queryInput.value.trim();
            if (!prompt) return;

            // UI Updates
            appendMessage(prompt, 'user');
            queryInput.value = "";
            setLoading(true);

            try {
                const response = await fetch("http://localhost:11434/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        model: "llama3.1", 
                        prompt: prompt, 
                        stream: false 
                    })
                });

                if (!response.ok) throw new Error("Backend Offline");

                const data = await response.json();
                appendMessage(data.response, 'ai');
            } catch (e) {
                appendMessage("**Connectivity Error:** Check if Ollama is running and CORS is enabled via `OLLAMA_ORIGINS='*'` environment variable.", 'ai');
            } finally {
                setLoading(false);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        function appendMessage(text, side) {
            const div = document.createElement('div');
            div.className = `bubble ${side}`;
            // Use marked for AI side, simple text for user side
            div.innerHTML = side === 'ai' ? marked.parse(text) : document.createTextNode(text).textContent;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            sendBtn.textContent = isLoading ? "THINKING..." : "PROCEED";
            queryInput.disabled = isLoading;
        }
    </script>
</body>
</html>
