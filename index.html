<!DOCTYPE html>
<html>
<head>
    <title>Llama 3.2 Chat</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; display: flex; flex-direction: column; height: 90vh; }
        #chat { flex: 1; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        #input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Llama 3.2 Local Chat</h2>
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask Llama something...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat');
            const message = input.value;
            if (!message) return;

            chat.innerHTML += `<div><b>You:</b> ${message}</div>`;
            input.value = '';

            try {
                const response = await fetch("http://localhost:11434/api/generate", {
                    method: "POST",
                    body: JSON.stringify({ model: "llama3.2", prompt: message, stream: false })
                });
                const data = await response.json();
                chat.innerHTML += `<div><b>Llama:</b> ${data.response}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (err) {
                chat.innerHTML += `<div style="color:red">Error: Make sure Ollama is running and CORS is enabled!</div>`;
            }
        }
    </script>
</body>
</html>
