<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bijani OS | AI Dashboard</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg: #020617;
            --sidebar-glass: rgba(15, 23, 42, 0.7);
            --accent-glow: #38bdf8;
            --accent-purple: #818cf8;
            --panel: rgba(30, 41, 59, 0.4);
            --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.08) 0, transparent 50%);
            color: #f8fafc; margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* SIDEBAR */
        nav { width: 280px; background: var(--sidebar-glass); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 40px 24px; }
        .brand { font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 60px; }
        .section-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; margin: 30px 0 15px 10px; }
        
        .nav-btn { 
            padding: 16px 20px; border-radius: 16px; margin-bottom: 12px; cursor: pointer;
            display: flex; align-items: center; transition: 0.3s; color: var(--text-dim); border: 1px solid transparent;
        }
        .nav-btn:hover:not(.locked) { background: var(--panel); color: #fff; }
        .nav-btn.active { background: linear-gradient(135deg, var(--accent-glow), var(--accent-purple)); color: #020617; font-weight: 700; }
        .nav-btn.locked { opacity: 0.3; cursor: not-allowed; }

        /* MAIN CONTENT AREA */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .view { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.4s ease; }
        .view.active { display: flex; }

        /* INTELLIGENCE HUB (CHAT) */
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 12%; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 80%; padding: 18px 22px; border-radius: 20px; line-height: 1.6; }
        .user { align-self: flex-end; background: var(--panel); border: 1px solid rgba(255,255,255,0.1); }
        .ai { align-self: flex-start; background: rgba(56, 189, 248, 0.05); border: 1px solid rgba(56, 189, 248, 0.2); }

        /* DATA VAULT (UPLOAD) */
        .vault-container { padding: 60px 12%; text-align: center; }
        .upload-box { 
            border: 2px dashed rgba(255,255,255,0.1); border-radius: 30px; padding: 60px;
            background: var(--panel); transition: 0.3s; cursor: pointer;
        }
        .upload-box:hover { border-color: var(--accent-glow); background: rgba(56, 189, 248, 0.05); }

        /* INPUTS */
        .footer { padding: 20px 12% 40px; }
        .input-wrapper { background: rgba(30, 41, 59, 0.6); border-radius: 24px; padding: 8px 25px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; padding: 15px 0; }
        .action-btn { background: #fff; color: #000; border: none; padding: 12px 28px; border-radius: 18px; cursor: pointer; font-weight: 800; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="brand">Bijani // OS</div>
        <div class="section-label">Core Intelligence</div>
        <div class="nav-btn active" onclick="switchView('chat-view', this)">Intelligence Hub</div>
        <div class="nav-btn" onclick="switchView('vault-view', this)">Data Vault</div>
        <div class="section-label">Creative Extensions</div>
        <div class="nav-btn locked">Vision Studio</div>
    </nav>

    <main>
        <!-- CHAT VIEW -->
        <div id="chat-view" class="view active">
            <div id="chat-window">
                <div class="bubble ai">System ready. Awaiting secure inquiry...</div>
            </div>
            <div class="footer">
                <div class="input-wrapper">
                    <input type="text" id="query" placeholder="Ask your data anything..." onkeypress="if(event.key==='Enter') execute()">
                    <button class="action-btn" onclick="execute()">PROCEED</button>
                </div>
            </div>
        </div>

        <!-- VAULT VIEW -->
        <div id="vault-view" class="view">
            <div class="vault-container">
                <h2>Knowledge Ingestion</h2>
                <p style="color: var(--text-dim)">Upload PDF files to train your local Vector Database.</p>
                <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                    <div style="font-size: 3rem; margin-bottom: 20px;">📁</div>
                    <h3>Drop your files here</h3>
                    <p>or click to browse from computer</p>
                    <input type="file" id="fileInput" hidden accept=".pdf,.txt" onchange="handleUpload()">
                </div>
                <div id="status-list" style="margin-top: 30px; text-align: left; color: var(--accent-glow);"></div>
            </div>
        </div>
    </main>

    <script>
        // VIEW SWITCHER LOGIC
        function switchView(viewId, btn) {
            // Update Buttons
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Update Views
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        // CHAT LOGIC
        async function execute() {
            const input = document.getElementById('query');
            const win = document.getElementById('chat-window');
            if(!input.value.trim()) return;

            const text = input.value;
            win.innerHTML += `<div class="bubble user">${text}</div>`;
            input.value = "";

            try {
                const res = await fetch("http://localhost:11434/api/generate", {
                    method: "POST",
                    body: JSON.stringify({ model: "llama3.1", prompt: text, stream: false })
                });
                const data = await res.json();
                win.innerHTML += `<div class="bubble ai">${marked.parse(data.response)}</div>`;
            } catch (e) {
                win.innerHTML += `<div class="bubble ai" style="color:red">Connect Error: Check Ollama.</div>`;
            }
            win.scrollTop = win.scrollHeight;
        }

        // UPLOAD PLACEHOLDER
        function handleUpload() {
            const file = document.getElementById('fileInput').files[0];
            const list = document.getElementById('status-list');
            list.innerHTML += `<div>● Preparing to ingest: <b>${file.name}</b>... (Ready for Python Backend)</div>`;
        }
    </script>
</body>
</html>
